# Cloud Agility Broker — TLS at Nginx, FastAPI on localhost:8000
#
# 1) Create DNS A (or AAAA) record: your-api.example.com → this EC2 public IP
# 2) On Ubuntu:
#    sudo apt update && sudo apt install -y nginx python3-certbot-nginx
#    sudo cp deploy/nginx-cloud-broker.conf /etc/nginx/sites-available/cloud-broker
#    sudo sed -i 's/__API_DOMAIN__/your-api.example.com/g' /etc/nginx/sites-available/cloud-broker
#    sudo ln -sf /etc/nginx/sites-available/cloud-broker /etc/nginx/sites-enabled/cloud-broker
#    sudo nginx -t && sudo systemctl reload nginx
#    sudo certbot --nginx -d your-api.example.com
# 3) Point cloud-broker.service at 127.0.0.1 (see repo), reload systemd, restart cloud-broker
# 4) EC2 security group: allow 443 (and 80 for ACME renewals). You can remove public 8000.
# 5) Amplify rewrite: /api/<*> → https://your-api.example.com/<*>
#
# Replace __API_DOMAIN__ before enabling (or use sed as above).

server {
    listen 80;
    listen [::]:80;
    server_name __API_DOMAIN__;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
